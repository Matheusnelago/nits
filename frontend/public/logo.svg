<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#3B82F6" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bgGradient)" filter="url(#shadow)"/>
  <rect x="20" y="20" width="160" height="160" rx="32" fill="url(#bgGradient)" fill-opacity="0.8"/>
  
  <path d="M40 130 L70 100 L100 115 L130 85 L160 100" 
        stroke="white" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"
        opacity="0.3"/>
  
  <text x="100" y="115" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="56" 
        font-weight="800" 
        fill="url(#textGradient)" 
        text-anchor="middle"
        filter="url(#glow)"
        letter-spacing="2">
    ITS
  </text>
  
  <line x1="60" y1="135" x2="140" y2="135" 
        stroke="white" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.8"/>
  
  <circle cx="50" cy="50" r="4" fill="white" opacity="0.6"/>
  <circle cx="150" cy="50" r="3" fill="white" opacity="0.4"/>
  <circle cx="160" cy="150" r="5" fill="white" opacity="0.5"/>
  <circle cx="45" cy="155" r="3" fill="white" opacity="0.3"/>
</svg>
